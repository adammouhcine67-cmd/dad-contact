<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<title>Contact</title>
<style>
  :root{
    --ink:#132022;
    --paper:#EFEAE0;
    --signal:#1F5FA8;
    --signal-dim:#164378;
    --line:#c9c0ac;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{
    background:#EFEAE0 !important;
  }
  body{
    background:#EFEAE0 !important;
    color:#132022 !important;
    font-family:'Helvetica Neue',Arial,sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .card{
    max-width:420px;
    width:100%;
    text-align:center;
    padding:48px 32px 40px;
    position:relative;
    background:#EFEAE0 !important;
  }

  .eyebrow{
    font-size:11px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--signal-dim);
    margin-bottom:18px;
    font-weight:600;
  }

  .rings{
    width:96px;
    height:96px;
    margin:0 auto 28px;
    position:relative;
  }
  .ring{
    position:absolute;
    top:50%;left:50%;
    border:2px solid var(--signal);
    border-radius:50%;
    transform:translate(-50%,-50%);
    opacity:0;
    animation:pulse 2.6s ease-out infinite;
  }
  .ring:nth-child(1){width:30px;height:30px;animation-delay:0s;}
  .ring:nth-child(2){width:30px;height:30px;animation-delay:0.7s;}
  .ring:nth-child(3){width:30px;height:30px;animation-delay:1.4s;}
  .dot{
    position:absolute;
    top:50%;left:50%;
    width:14px;height:14px;
    background:var(--signal);
    border-radius:50%;
    transform:translate(-50%,-50%);
  }
  @keyframes pulse{
    0%{width:14px;height:14px;opacity:0.9;}
    100%{width:96px;height:96px;opacity:0;}
  }
  @media (prefers-reduced-motion: reduce){
    .ring{animation:none;opacity:0.35;width:60px;height:60px;}
  }

  h1{
    font-size:28px;
    font-weight:700;
    margin:0 0 6px;
    letter-spacing:-0.01em;
    color:#132022 !important;
  }
  .role{
    font-size:15px;
    color:#4c5a5a;
    margin:0 0 32px;
  }

  .btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:var(--signal);
    color:#fff;
    text-decoration:none;
    font-size:17px;
    font-weight:600;
    padding:16px 20px;
    border-radius:10px;
    transition:background 0.15s ease, transform 0.1s ease;
  }
  .btn:hover{background:var(--signal-dim);}
  .btn:active{transform:scale(0.98);}
  .btn:focus-visible{
    outline:3px solid var(--signal-dim);
    outline-offset:3px;
  }
  .btn svg{flex:none;width:20px;height:20px;}

  .btn-secondary{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:transparent;
    color:var(--ink);
    text-decoration:none;
    font-size:16px;
    font-weight:600;
    padding:14px 20px;
    border-radius:10px;
    border:1.5px solid var(--line);
    margin-top:12px;
    transition:border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
  }
  .btn-secondary:hover{border-color:#0a66c2;background:rgba(10,102,194,0.06);}
  .btn-secondary:active{transform:scale(0.98);}
  .btn-secondary:focus-visible{
    outline:3px solid #0a66c2;
    outline-offset:3px;
  }
  .btn-secondary svg{flex:none;width:18px;height:18px;color:#0a66c2;}

  .number{
    margin-top:18px;
    font-size:14px;
    color:#5c6a6a;
    letter-spacing:0.02em;
  }

  .divider{
    border:none;
    border-top:1px solid var(--line);
    margin:32px 0 20px;
  }

  .note{
    font-size:13px;
    color:#6b7878;
    line-height:1.5;
    margin:0;
  }
</style>
</head>
<body>

  <div class="card">
    <div class="eyebrow">Direct line</div>

    <div class="rings">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="dot"></div>
    </div>

      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.38-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.07 2.07 0 1 1 0-4.14 2.07 2.07 0 0 1 0 4.14zM7.12 20.45H3.56V9h3.56v11.45z"/>

  </div>

</body>
</html>
